<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="weather-wrap">
    <div class="header-row">
      <h1 class="app-title">Weather App</h1>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    </div>

    <div class="search-row">
      <input type="text" id="city-input" placeholder="Search city... e.g. London" />
      <button id="search-btn" onclick="fetchWeather()">Search</button>
    </div>

    <div id="status"></div>

    <div id="weather-card" style="display:none;">
      <div class="card">
        <p class="city-name" id="city-display"></p>
        <p class="date-text" id="date-display"></p>

        <div class="main-weather">
          <div class="weather-icon" id="main-icon"></div>
          <div>
            <div class="temp" id="temp-display"></div>
            <div class="condition" id="condition-display"></div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Feels like</div>
            <div class="stat-value" id="feels-like"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Humidity</div>
            <div class="stat-value" id="humidity"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Wind</div>
            <div class="stat-value" id="wind"></div>
          </div>
        </div>

        <p class="section-label">5-Day Forecast</p>
        <div class="forecast" id="forecast-row"></div>
      </div>
    </div>
  </div>
  <h2>Current Time</h2>
    <div id="clock">00:00:00</div>

  <script src="script.js"></script>
</body>
</html>
